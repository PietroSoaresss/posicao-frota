spring.application.name=pavi_api
server.port=8080
spring.jpa.hibernate.ddl-auto=update
jwt.secret=YOUR_JWT_SECRET_HERE
app.rate-limit.max-requests=120
app.rate-limit.window-millis=60000

# Sascar/SASINTEGRA tracking integration
sascar.enabled=true
sascar.ws-url=https://sasintegra.sascar.com.br:443/SasIntegra/SasIntegraWSService
sascar.user=YOUR_SASCAR_USER
sascar.password=YOUR_SASCAR_PASSWORD
sascar.position-quantity=3000
sascar.sync-interval-ms=120000
sascar.history-retention-days=7

# Database: PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pavi
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
