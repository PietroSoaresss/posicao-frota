spring.application.name=pavi_api
server.port=8080
spring.jpa.hibernate.ddl-auto=update
jwt.secret=${JWT_SECRET}
app.rate-limit.max-requests=120
app.rate-limit.window-millis=60000

# Sascar/SASINTEGRA tracking integration
sascar.enabled=true
sascar.ws-url=${SASCAR_WS_URL}
sascar.user=${SASCAR_USER}
sascar.password=${SASCAR_PASSWORD}
sascar.position-quantity=3000
sascar.sync-interval-ms=120000
sascar.history-retention-days=7

# Database: PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pavi}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
