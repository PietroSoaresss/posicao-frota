spring.application.name=pavi_api
server.port=8080

# Load secrets from .env in the project root (gitignored). Falls through silently when absent.
spring.config.import=optional:file:./.env[.properties]

# Honor X-Forwarded-* from a trusted edge proxy (ALB / Nginx) so HTTPS, host
# and client IP are correctly resolved when the app sits behind TLS termination.
server.forward-headers-strategy=framework

# Never echo stack traces in HTTP error bodies.
server.error.include-stacktrace=never
server.error.include-message=always

spring.jpa.hibernate.ddl-auto=update

# Auth
jwt.secret=${JWT_SECRET}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}

# CORS — comma-separated list of explicit origins. Never set to "*".
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Rate limit. Set trust-forwarded-for=true ONLY when behind a proxy that
# overwrites the X-Forwarded-For header.
app.rate-limit.max-requests=120
app.rate-limit.window-millis=60000
app.rate-limit.trust-forwarded-for=${APP_RATE_LIMIT_TRUST_FORWARDED_FOR:false}

# Sascar/SASINTEGRA tracking integration
sascar.enabled=true
sascar.ws-url=https://sasintegra.sascar.com.br:443/SasIntegra/SasIntegraWSService
sascar.user=${SASCAR_USER}
sascar.password=${SASCAR_PASSWORD}
sascar.position-quantity=3000
sascar.sync-interval-ms=120000
sascar.history-retention-days=7

# Database: PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pavi}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging — quieter by default; the prod profile lowers it further.
logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
spring.jpa.show-sql=false
