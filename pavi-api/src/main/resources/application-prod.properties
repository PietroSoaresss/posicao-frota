# Production overrides. Activate with SPRING_PROFILES_ACTIVE=prod.

# Schema changes ship as explicit SQL — never let Hibernate touch the schema.
spring.jpa.hibernate.ddl-auto=validate

# Behind an ALB / Nginx that overwrites X-Forwarded-For with the client IP.
app.rate-limit.trust-forwarded-for=true

# Session cookie set Secure (only sent over HTTPS). Required in production
# because the ALB terminates TLS and the SPA is served over HTTPS.
app.session.cookie-secure=true

# Quiet, structured logs.
logging.level.root=WARN
logging.level.br.com.pavi=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
spring.jpa.show-sql=false

# === RDS PostgreSQL ===
# Enforce TLS on every connection (RDS parameter group should also set
# rds.force_ssl=1 so the DB rejects plaintext from any client).
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.ApplicationName=pavi-api

# Pool tuned for a single small/medium EC2. Adjust to the RDS instance class.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
