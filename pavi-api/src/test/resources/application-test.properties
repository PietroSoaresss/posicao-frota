spring.application.name=pavi_api
server.port=8080
spring.datasource.url=${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=pavi_test}
spring.datasource.username=${TEST_DATABASE_USERNAME:postgres}
spring.datasource.password=${TEST_DATABASE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=pavi_test
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:test-schema.sql
jwt.secret=this-is-a-test-secret-key-for-testing-purposes-only-12345678
