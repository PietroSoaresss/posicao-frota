<div class="pv-overlay" (click)="close()"></div>
<div class="pv-modal-wrap" role="dialog" aria-modal="true" aria-label="Confirmar exclusão de motorista">
  <div class="pv-modal motoristas-confirm-modal">
    <header class="pv-modal-header motoristas-confirm-header">
      <div class="pv-modal-header-left">
        <div class="motoristas-confirm-icon">
          <app-icon name="trash" [size]="18"></app-icon>
        </div>
        <div>
          <div class="pv-modal-kicker">EXCLUIR MOTORISTA</div>
          <div class="pv-modal-title">Confirme a remoção do cadastro</div>
        </div>
      </div>
      <button class="pv-icon-btn pv-icon-btn-light" (click)="close()" title="Fechar">
        <app-icon name="close" [size]="16"></app-icon>
      </button>
    </header>

    <div class="pv-modal-body">
      <section class="pv-modal-section">
        <div class="pv-cadastro-head">
          <div class="pv-entity-avatar pv-entity-avatar-lg motoristas-confirm-avatar">{{ initials }}</div>
          <div>
            <div class="pv-cadastro-name">{{ motorista.nome }}</div>
            <div class="pv-cadastro-sub">
              CNH <span class="pv-mono">{{ motorista.cnh }}</span> · código <span class="pv-mono">#{{ motorista.codigo.toString().padStart(3, '0') }}</span>
            </div>
          </div>
        </div>

        <div class="motoristas-confirm-warning">
          <app-icon name="alert" [size]="14"></app-icon>
          <span>Essa ação remove o motorista permanentemente e não pode ser desfeita.</span>
        </div>
      </section>
    </div>

    <footer class="pv-modal-footer">
      <div class="pv-modal-footer-left">
        <span class="motoristas-confirm-footnote">Revise o cadastro antes de excluir.</span>
      </div>
      <div class="pv-modal-footer-right">
        <button class="pv-btn-secondary" (click)="close()" [disabled]="isDeleting">Cancelar</button>
        <button class="pv-btn-danger" (click)="confirm()" [disabled]="isDeleting">
          <app-icon name="trash" [size]="13"></app-icon>{{ isDeleting ? 'Excluindo...' : 'Excluir motorista' }}
        </button>
      </div>
    </footer>
  </div>
</div>
