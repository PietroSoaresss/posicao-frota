<div class="pv-overlay" (click)="close()"></div>
<div class="pv-modal-wrap" role="dialog" aria-modal="true" aria-label="Nova posição">
  <div class="pv-modal pv-modal-edit">
    <header class="pv-modal-header">
      <div class="pv-modal-header-left">
        <div>
          <div class="pv-modal-kicker">NOVA POSIÇÃO</div>
          <div class="pv-modal-title">
            <span class="pv-mono-code" style="color: #fff; font-size: 15px">P-???</span>
            <app-status-pill [status]="form().status"></app-status-pill>
          </div>
        </div>
      </div>
      <button class="pv-icon-btn pv-icon-btn-light" (click)="close()" title="Fechar (Esc)">
        <app-icon name="close" [size]="16"></app-icon>
      </button>
    </header>

    <div class="pv-modal-body">
      <div class="pv-modal-body-inner">
        <!-- ROTA -->
        <section class="pv-modal-section">
          <div class="pv-modal-section-title-row">
            <div class="pv-modal-section-title">ROTA</div>
            <div class="pv-rota-mini-km pv-mono">
              <app-icon name="route" [size]="12"></app-icon>
              <input class="pv-rota-mini-input" [value]="form().km ?? ''" (input)="onKmInput($event)"
                inputmode="numeric" /> km
            </div>
          </div>

          <div class="pv-rota-edit">
            <!-- Origem -->
            <div class="pv-rota-edit-node">
              <div class="pv-rota-dot pv-rota-dot-origin"></div>
              <div class="pv-rota-edit-fields">
                <div class="pv-rota-edit-tag">ORIGEM</div>
                <div class="pv-form-grid pv-form-grid-tight">
                  <app-form-field label="Cidade" [span]="1" [required]="true">
                    <app-select-input [value]="toString(form().cod_cidade_origem)" [options]="cidadeOpts()"
                      placeholder="Selecione a cidade" [searchable]="true" (valueChange)="upd('cod_cidade_origem', $event)">
                    </app-select-input>
                  </app-form-field>
                  <app-form-field label="Cliente" [span]="1" [required]="true">
                    <app-select-input [value]="toString(form().cod_origem_empresa)" [options]="origemEmpresaOpts()"
                      placeholder="Selecione cliente" [searchable]="true" (valueChange)="upd('cod_origem_empresa', $event)">
                    </app-select-input>
                  </app-form-field>
                </div>
              </div>
            </div>

            <div class="pv-rota-edit-line">
              <div class="pv-rota-edit-line-track"></div>
            </div>

            <!-- Destino -->
            <div class="pv-rota-edit-node">
              <div class="pv-rota-dot pv-rota-dot-dest"></div>
              <div class="pv-rota-edit-fields">
                <div class="pv-rota-edit-tag">DESTINO</div>
                <div class="pv-form-grid pv-form-grid-tight">
                  <app-form-field label="Cidade" [span]="1">
                    <app-select-input [value]="toString(form().cod_cidade_destino)" [options]="cidadeOpts()"
                      placeholder="Selecione a cidade" [searchable]="true" (valueChange)="upd('cod_cidade_destino', $event)">
                    </app-select-input>
                  </app-form-field>
                  <app-form-field label="Cliente" [span]="1">
                    <app-select-input [value]="toString(form().cod_destino_empresa)" [options]="destinoEmpresaOpts()"
                      placeholder="Selecione cliente" [searchable]="true" (valueChange)="upd('cod_destino_empresa', $event)">
                    </app-select-input>
                  </app-form-field>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- PROGRAMAÇÃO E VALORES -->
        <section class="pv-modal-section">
          <div class="pv-modal-section-title">PROGRAMAÇÃO E VALORES</div>
          <div class="pv-form-grid">
            <app-form-field label="Status" [span]="1" [required]="true">
              <app-select-input [value]="form().status" [options]="statusOpts()" (valueChange)="upd('status', $event)">
              </app-select-input>
            </app-form-field>
            <app-form-field label="Data de início" [span]="1" [required]="true">
              <app-date-input [value]="form().data_inicio" (valueChange)="upd('data_inicio', $event)"></app-date-input>
            </app-form-field>
            <app-form-field label="Data de fim" [span]="1">
              <app-date-input [value]="form().data_fim" (valueChange)="upd('data_fim', $event)"></app-date-input>
            </app-form-field>
            <app-form-field label="Valor do frete" [span]="1" [required]="true">
              <app-money-input [value]="form().valor_frete"
                (valueChange)="upd('valor_frete', $event)"></app-money-input>
            </app-form-field>
            <app-form-field label="Valor do pedágio" [span]="1">
              <app-money-input [value]="form().valor_pedagio"
                (valueChange)="upd('valor_pedagio', $event)"></app-money-input>
            </app-form-field>
          </div>
        </section>

        <!-- MOTORISTA -->
        <section class="pv-modal-section">
          <div class="pv-modal-section-title">MOTORISTA</div>
          <app-form-field label="Motorista designado" [span]="1" [required]="true">
            <app-select-input [value]="toString(form().cod_motorista)" [options]="motoristaOpts()"
              placeholder="Selecione o motorista" [searchable]="true" (valueChange)="upd('cod_motorista', $event)">
            </app-select-input>
          </app-form-field>
        </section>

        <!-- VEÍCULOS -->
        <section class="pv-modal-section">
          <div class="pv-modal-section-title">VEÍCULOS</div>
          <div class="pv-form-grid">
            <app-form-field label="Cavalo" [span]="1">
              <app-select-input [value]="toString(form().cod_cavalo)" [options]="cavaloOpts()"
                placeholder="Selecione o cavalo" [searchable]="true" (valueChange)="upd('cod_cavalo', $event)">
              </app-select-input>
            </app-form-field>
            <app-form-field label="Carreta" [span]="1">
              <app-select-input [value]="toString(form().cod_carreta)" [options]="carretaOpts()"
                placeholder="Selecione a carreta" [searchable]="true" (valueChange)="upd('cod_carreta', $event)">
              </app-select-input>
            </app-form-field>
          </div>
        </section>

        <!-- OBSERVAÇÕES -->
        <section class="pv-modal-section">
          <div class="pv-modal-section-title">OBSERVAÇÕES</div>
          <app-form-field label="Anotações da viagem" [span]="1">
            <textarea class="pv-input-control pv-textarea" rows="3" [value]="form().observacoes"
              (input)="onObsInput($event)" placeholder="Ex: carga frágil, agendar com 2h de antecedência…"></textarea>
          </app-form-field>
        </section>
      </div>
    </div>

    <footer class="pv-modal-footer">
      <div class="pv-modal-footer-left">
        <span *ngIf="dirty()" class="pv-dirty-mark">
          <span class="pv-dirty-dot"></span> alterações não salvas
        </span>
      </div>
      <div class="pv-modal-footer-right">
        <button class="pv-btn-secondary" (click)="close()">Cancelar</button>
        <button class="pv-btn-primary" (click)="save()">
          <app-icon name="check" [size]="13"></app-icon>Criar posição
        </button>
      </div>
    </footer>
  </div>
</div>
