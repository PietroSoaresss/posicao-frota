<div class="pv-modal-body-inner">
  <section class="pv-modal-section">
    <div class="pv-cadastro-head">
      <div class="pv-entity-icon pv-entity-icon-lg">
        <app-icon name="truck" [size]="22"></app-icon>
      </div>
      <div>
        <div class="pv-cadastro-name pv-mono">{{ form().placa || '—' }}</div>
        <div class="pv-cadastro-sub">{{ form().tipo || tipo }} · {{ modeloCompleto(form().cod_modelo) || '—' }}</div>
      </div>
    </div>
  </section>
  <section class="pv-modal-section">
    <div class="pv-modal-section-title">IDENTIFICAÇÃO</div>
    <div class="pv-form-grid">
      <app-form-field label="Placa" [span]="1" [required]="true">
        <app-text-input [value]="form().placa" [mono]="true" (valueChange)="upd('placa', $event.toUpperCase())"></app-text-input>
      </app-form-field>
      <app-form-field label="Tipo" [span]="1">
        <app-select-input [value]="form().tipo || tipo" [options]="tipoOpts" (valueChange)="upd('tipo', $event)"></app-select-input>
      </app-form-field>
      <app-form-field label="Modelo" [span]="2" [required]="true">
        <app-select-input [value]="toString(form().cod_modelo)"
          [options]="modeloOpts()" (valueChange)="upd('cod_modelo', $event)">
        </app-select-input>
      </app-form-field>
      <app-form-field label="Ano de fabricação" [span]="1">
        <app-text-input [value]="form().ano_fabricacao" [mono]="true" inputmode="numeric"
          (valueChange)="upd('ano_fabricacao', $event.replace(/\D/g, '').slice(0, 4))"></app-text-input>
      </app-form-field>
      <app-form-field label="Ano modelo" [span]="1">
        <app-text-input [value]="form().ano_modelo" [mono]="true" inputmode="numeric"
          (valueChange)="upd('ano_modelo', $event.replace(/\D/g, '').slice(0, 4))"></app-text-input>
      </app-form-field>
    </div>
  </section>
  <section class="pv-modal-section">
    <div class="pv-modal-section-title">DOCUMENTAÇÃO</div>
    <div class="pv-form-grid">
      <app-form-field label="Chassi" [span]="2" [required]="true">
        <app-text-input [value]="form().chassi" [mono]="true" (valueChange)="upd('chassi', $event.toUpperCase())"></app-text-input>
      </app-form-field>
      <app-form-field label="RENAVAM" [span]="2" [required]="true">
        <app-text-input [value]="form().renavam" [mono]="true" inputmode="numeric"
          (valueChange)="upd('renavam', $event.replace(/\D/g, ''))"></app-text-input>
      </app-form-field>
    </div>
  </section>
</div>
