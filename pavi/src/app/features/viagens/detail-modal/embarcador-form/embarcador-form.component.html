<div class="pv-modal-body-inner">
  <section class="pv-modal-section">
    <div class="pv-cadastro-head">
      <div class="pv-entity-icon pv-entity-icon-lg">
        <app-icon name="building" [size]="22"></app-icon>
      </div>
      <div>
        <div class="pv-cadastro-name">{{ form().razao_social || '—' }}</div>
        <div class="pv-cadastro-sub">{{ papel }} · CNPJ <span class="pv-mono">{{ form().cnpj || '—' }}</span></div>
      </div>
    </div>
  </section>
  <section class="pv-modal-section">
    <div class="pv-modal-section-title">DADOS DA EMPRESA</div>
    <div class="pv-form-grid">
      <app-form-field label="Razão social" [span]="2" [required]="true">
        <app-text-input [value]="form().razao_social" icon="building" (valueChange)="upd('razao_social', $event)"></app-text-input>
      </app-form-field>
      <app-form-field label="CNPJ" [span]="1" [required]="true">
        <app-text-input [value]="form().cnpj" [mono]="true" (valueChange)="upd('cnpj', $event.replace(/\D/g, ''))"></app-text-input>
      </app-form-field>
      <app-form-field label="Código" [span]="1">
        <app-text-input [value]="toString(empresa?.codigo)" [readonly]="true" [mono]="true"></app-text-input>
      </app-form-field>
      <app-form-field label="CEP" [span]="1" [required]="true">
        <app-text-input [value]="form().cep" [mono]="true" (valueChange)="upd('cep', $event.replace(/\D/g, ''))"></app-text-input>
      </app-form-field>
      <app-form-field label="Bairro" [span]="1" [required]="true">
        <app-text-input [value]="form().bairro" (valueChange)="upd('bairro', $event)"></app-text-input>
      </app-form-field>
      <app-form-field label="Rua" [span]="2" [required]="true">
        <app-text-input [value]="form().rua" (valueChange)="upd('rua', $event)"></app-text-input>
      </app-form-field>
      <app-form-field label="Número" [span]="1" [required]="true">
        <app-text-input [value]="form().numero" [mono]="true" (valueChange)="upd('numero', $event)"></app-text-input>
      </app-form-field>
      <app-form-field label="Complemento" [span]="1">
        <app-text-input [value]="form().complemento" (valueChange)="upd('complemento', $event)"></app-text-input>
      </app-form-field>
    </div>
  </section>
  <section class="pv-modal-section">
    <div class="pv-modal-section-title">LOCALIZAÇÃO</div>
    <div class="pv-form-grid">
      <app-form-field label="Cidade" [span]="2" [required]="true">
        <app-select-input
          [value]="toString(form().cod_cidade)"
          [options]="cidadeOpts()"
          placeholder="Selecione a cidade"
          [searchable]="true"
          (valueChange)="upd('cod_cidade', $event)"
        >
        </app-select-input>
      </app-form-field>
    </div>
  </section>
</div>
