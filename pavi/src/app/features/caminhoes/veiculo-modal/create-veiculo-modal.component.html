<div class="pv-overlay" (click)="close()"></div>
<div class="pv-modal-wrap" role="dialog" aria-modal="true" [attr.aria-label]="isEdit() ? 'Editar veículo' : 'Novo veículo'">
  <div class="pv-modal pv-modal-edit">
    <header class="pv-modal-header">
      <div class="pv-modal-header-left">
        <div>
          <div class="pv-modal-kicker">{{ isEdit() ? 'EDITAR VEÍCULO' : 'NOVO VEÍCULO' }}</div>
          <div class="pv-modal-title">
            <div
              class="pv-entity-icon"
              style="width: 28px; height: 28px; border-radius: 4px; background: rgba(255,255,255,0.2); color: #fff; display: grid; place-items: center;"
            >
              <app-icon name="truck" [size]="16"></app-icon>
            </div>
          </div>
        </div>
      </div>
      <button class="pv-icon-btn pv-icon-btn-light" (click)="close()" title="Fechar">
        <app-icon name="close" [size]="16"></app-icon>
      </button>
    </header>

    <div class="pv-modal-body">
      <div class="pv-modal-body-inner">
        <section class="pv-modal-section">
          <div class="pv-cadastro-head">
            <div class="pv-entity-icon pv-entity-icon-lg">
              <app-icon name="truck" [size]="22"></app-icon>
            </div>
            <div>
              <div class="pv-cadastro-name pv-mono">{{ form().placa || '—' }}</div>
              <div class="pv-cadastro-sub">{{ tipoLabel }} · {{ modeloLabel }}</div>
            </div>
          </div>
        </section>

        <section class="pv-modal-section">
          <div class="pv-modal-section-title">IDENTIFICAÇÃO</div>
          <div class="pv-form-grid">
            <app-form-field label="Placa" [span]="1" [required]="true">
              <app-text-input [value]="form().placa" [mono]="true" (valueChange)="upd('placa', $event.toUpperCase())"></app-text-input>
            </app-form-field>
            <app-form-field label="Tipo" [span]="1">
              <app-select-input [value]="form().tipo" [options]="tipoOpts" (valueChange)="upd('tipo', $event)"></app-select-input>
            </app-form-field>
            <app-form-field label="Modelo" [span]="2" [required]="true">
              <app-select-input [value]="toString(form().cod_modelo)" [options]="modeloOpts()" (valueChange)="upd('cod_modelo', $event)">
              </app-select-input>
            </app-form-field>
            <app-form-field label="Ano de fabricação" [span]="1" [required]="true">
              <app-text-input
                [value]="form().ano_fabricacao"
                [mono]="true"
                inputmode="numeric"
                (valueChange)="upd('ano_fabricacao', $event.replace(/\D/g, '').slice(0, 4))"
              ></app-text-input>
            </app-form-field>
            <app-form-field label="Ano modelo" [span]="1" [required]="true">
              <app-text-input
                [value]="form().ano_modelo"
                [mono]="true"
                inputmode="numeric"
                (valueChange)="upd('ano_modelo', $event.replace(/\D/g, '').slice(0, 4))"
              ></app-text-input>
            </app-form-field>
          </div>
        </section>

        <section class="pv-modal-section">
          <div class="pv-modal-section-title">DOCUMENTAÇÃO</div>
          <div class="pv-form-grid">
            <app-form-field label="Chassi" [span]="2" [required]="true">
              <app-text-input [value]="form().chassi" [mono]="true" (valueChange)="upd('chassi', $event.toUpperCase())"></app-text-input>
            </app-form-field>
            <app-form-field label="RENAVAM" [span]="2" [required]="true">
              <app-text-input
                [value]="form().renavam"
                [mono]="true"
                inputmode="numeric"
                (valueChange)="upd('renavam', $event.replace(/\D/g, ''))"
              ></app-text-input>
            </app-form-field>
          </div>
        </section>
      </div>
    </div>

    <footer class="pv-modal-footer">
      <div class="pv-modal-footer-left">
        <span *ngIf="dirty()" class="pv-dirty-mark">
          <span class="pv-dirty-dot"></span> alterações não salvas
        </span>
      </div>
      <div class="pv-modal-footer-right">
        <button class="pv-btn-secondary" (click)="close()">Cancelar</button>
        <button class="pv-btn-primary" (click)="save()">
          <app-icon name="check" [size]="13"></app-icon>{{ isEdit() ? 'Salvar alterações' : 'Criar veículo' }}
        </button>
      </div>
    </footer>
  </div>
</div>
