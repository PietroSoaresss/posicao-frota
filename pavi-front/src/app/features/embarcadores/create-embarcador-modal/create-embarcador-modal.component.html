<div class="pv-overlay" (click)="close()"></div>
<div class="pv-modal-wrap" role="dialog" aria-modal="true" [attr.aria-label]="isEdit() ? 'Editar cliente' : 'Novo cliente'">
  <div class="pv-modal pv-modal-edit">
    <header class="pv-modal-header">
      <div class="pv-modal-header-left">
        <div>
          <div class="pv-modal-kicker">{{ isEdit() ? 'EDITAR CLIENTE' : 'NOVO CLIENTE' }}</div>
          <div class="pv-modal-title">
            <div
              class="pv-entity-icon"
              style="width: 28px; height: 28px; border-radius: 4px; background: rgba(255,255,255,0.2); color: #fff; display: grid; place-items: center;"
            >
              <app-icon name="building" [size]="16"></app-icon>
            </div>
          </div>
        </div>
      </div>
      <button class="pv-icon-btn pv-icon-btn-light" (click)="close()" title="Fechar">
        <app-icon name="close" [size]="16"></app-icon>
      </button>
    </header>

    <div class="pv-modal-body">
      <div class="pv-modal-body-inner">
        <section class="pv-modal-section">
          <div class="pv-cadastro-head">
            <div class="pv-entity-icon pv-entity-icon-lg">
              <app-icon name="building" [size]="22"></app-icon>
            </div>
            <div>
              <div class="pv-cadastro-name">{{ form().razao_social || '—' }}</div>
              <div class="pv-cadastro-sub">Cliente · código <span class="pv-mono">#{{ codigoStr() }}</span></div>
            </div>
          </div>
        </section>

        <section class="pv-modal-section">
          <div class="pv-modal-section-title">DADOS DA EMPRESA</div>
          <div class="pv-form-grid">
            <app-form-field label="Razão social" [span]="2" [required]="true">
              <app-text-input [value]="form().razao_social" icon="building" (valueChange)="upd('razao_social', $event)"></app-text-input>
            </app-form-field>
            <app-form-field label="CNPJ" [span]="1" [required]="true">
              <app-text-input [value]="form().cnpj" [mono]="true" inputMode="numeric" [maxLength]="14" (valueChange)="upd('cnpj', $event.replace(/\D/g, '').slice(0, 14))"></app-text-input>
            </app-form-field>
            <app-form-field label="Código" [span]="1" *ngIf="isEdit()">
              <app-text-input [value]="codigoStr()" [readonly]="true" [mono]="true"></app-text-input>
            </app-form-field>
            <app-form-field label="CEP" [span]="1" [required]="true">
              <app-text-input [value]="form().cep" [mono]="true" inputMode="numeric" [maxLength]="8" (valueChange)="upd('cep', $event.replace(/\D/g, '').slice(0, 8))"></app-text-input>
            </app-form-field>
            <app-form-field label="Bairro" [span]="1" [required]="true">
              <app-text-input [value]="form().bairro" (valueChange)="upd('bairro', $event)"></app-text-input>
            </app-form-field>
            <app-form-field label="Rua" [span]="2" [required]="true">
              <app-text-input [value]="form().rua" (valueChange)="upd('rua', $event)"></app-text-input>
            </app-form-field>
            <app-form-field label="Número" [span]="1" [required]="true">
              <app-text-input [value]="form().numero" [mono]="true" inputMode="numeric" [maxLength]="6" (valueChange)="upd('numero', $event.replace(/\D/g, '').slice(0, 6))"></app-text-input>
            </app-form-field>
            <app-form-field label="Complemento" [span]="1">
              <app-text-input [value]="form().complemento" (valueChange)="upd('complemento', $event)"></app-text-input>
            </app-form-field>
          </div>
        </section>

        <section class="pv-modal-section">
          <div class="pv-modal-section-title">LOCALIZAÇÃO</div>
          <div class="pv-form-grid">
            <app-form-field label="Cidade" [span]="2" [required]="true">
              <app-select-input
                [value]="toString(form().cod_cidade)"
                [options]="cidadeOpts()"
                placeholder="Selecione a cidade"
                [searchable]="true"
                (valueChange)="upd('cod_cidade', $event)"
              >
              </app-select-input>
            </app-form-field>
          </div>
        </section>
      </div>
    </div>

    <footer class="pv-modal-footer">
      <div class="pv-modal-footer-left">
        <span *ngIf="dirty()" class="pv-dirty-mark">
          <span class="pv-dirty-dot"></span> alterações não salvas
        </span>
      </div>
      <div class="pv-modal-footer-right">
        <button class="pv-btn-secondary" (click)="close()">Cancelar</button>
        <button class="pv-btn-primary" (click)="save()">
          <app-icon name="check" [size]="13"></app-icon>{{ isEdit() ? 'Salvar alterações' : 'Criar cliente' }}
        </button>
      </div>
    </footer>
  </div>
</div>
